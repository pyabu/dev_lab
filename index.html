            transform: translateY(-12px) scale(1.02);

        @keyframes slide {
            from { transform: translateX(0); }
            to { transform: translateX(-50%); }
        }
        .ticker-scroll {
            display: flex;
            width: 200%;
            animation: slide 30s linear infinite;
        }
        .page-transition {
            animation: fadeInUp 0.6s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }

    <script>
        // Single Page Application Router
        const navigateTo = (pageId) => {
            const container = document.getElementById('app');
            const templateEl = document.getElementById(`tpl-${pageId}`);
            
            if (!templateEl) {
                console.error(`Error: Template for page '${pageId}' missing`);
                return;
            }

            // Inject template HTML into the DOM
            container.innerHTML = templateEl.innerHTML;
            
            // Re-render Lucide icons for the newly injected HTML
            lucide.createIcons();
            
            // Handle active states on navigation links
            document.querySelectorAll('nav button').forEach(btn => btn.classList.remove('active-nav'));
            const activeBtn = document.getElementById(`nav-${pageId}`);
            if (activeBtn) activeBtn.classList.add('active-nav');

            // Scroll to the top of the page smoothly
            window.scrollTo({ top: 0, behavior: 'smooth' });
            
            // Auto-close mobile menu if open
            document.getElementById('mobile-menu').classList.add('hidden');
        };

        // Mobile menu toggle
        const toggleMobileMenu = () => {
            document.getElementById('mobile-menu').classList.toggle('hidden');
        };

        // Initialize application by loading the home page
        window.addEventListener('DOMContentLoaded', () => {
            navigateTo('home');
            lucide.createIcons(); // Initial load for global icons (nav, footer, floaters)
        });
    </script>
